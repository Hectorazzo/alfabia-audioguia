<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" rx="40" fill="#233B29"/>
  <!-- Stylised leaf / garden motif -->
  <g transform="translate(96,96)">
    <!-- Outer leaf shape -->
    <path d="M0,-52 C28,-52 52,-28 52,0 C52,28 28,52 0,52 C-28,52 -52,28 -52,0 C-52,-28 -28,-52 0,-52 Z"
          fill="none" stroke="#F8F2E7" stroke-width="4" opacity="0.35"/>
    <!-- Stem -->
    <line x1="0" y1="52" x2="0" y2="-10" stroke="#F8F2E7" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Leaf body -->
    <path d="M0,-10 C-30,-20 -38,-4 0,34 C38,-4 30,-20 0,-10 Z" fill="#F8F2E7" opacity="0.9"/>
    <!-- Leaf vein -->
    <line x1="0" y1="-8" x2="0" y2="28" stroke="#233B29" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
